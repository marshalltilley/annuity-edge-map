      lg.innerHTML+='<span class="sw"><i style="background:'+RAMP[i]+'"></i>'+lab+'</span>';
      if(hi)lo=hi; else break;}
    lg.innerHTML+='<span class="sw"><i style="background:var(--am-noval)"></i>none</span>';}
  function bars(list,max){var h="";
    list.forEach(function(row){var w=max>0?Math.max(2,row[1]/max*100):0;
      h+='<div class="am-bar"><div class="r"><span class="nm">'+row[0]+'</span><span class="vv">'+fmt(row[1])+'</span></div><div class="track"><div class="fill" style="width:'+w+'%"></div></div></div>';});
    return h||'<div style="font-size:12px;color:var(--am-mut)">No sales reported.</div>';}
  function panel(){var code=state.sel,d=DB.states[code];var pn=root.querySelector("#am-panel");
    var name=(GEO[code]&&GEO[code].name)||{PR:"Puerto Rico",GU:"Guam",AS:"American Samoa",MP:"N. Mariana Is."}[code]||code;
    var rank=Object.keys(DB.states).filter(function(k){return TERR.indexOf(k)<0;})
      .sort(function(a,b){return DB.states[b][state.metric]-DB.states[a][state.metric];}).indexOf(code)+1;
    var key={total:"topCombined",fixed:"topFixed",indexed:"topIndexed"}[state.metric];
    var list=d[key]||[];var max=list.length?list[0][1]:0;
    pn.innerHTML='<p class="pname">'+name+'</p>'+
      '<p class="prank">'+(TERR.indexOf(code)<0?("Rank #"+rank+" of 51 by "+METLABEL[state.metric].toLowerCase()+" sales"):"U.S. territory")+'</p>'+
      '<div class="am-metrics">'+mcard("Combined","total",d)+mcard("Fixed","fixed",d)+mcard("Indexed","indexed",d)+'</div>'+
      '<p class="am-carh">Top carriers &mdash; '+METLABEL[state.metric]+'</p>'+bars(list,max);}
  function mcard(lbl,m,d){return '<div class="m'+(m===state.metric?' act':'')+'"><div class="k">'+lbl+'</div><div class="v">'+fmt(d[m])+'</div></div>';}
  function terrChips(){var c=root.querySelector("#am-terr-chips");c.innerHTML="";
    TERR.forEach(function(t){var d=DB.states[t];if(!d)return;var b=document.createElement("button");
      b.className="chip"+(state.sel===t?" sel":"");b.innerHTML=t+" &middot; "+fmt(d[state.metric]);
      b.onclick=function(){state.sel=t;render();};c.appendChild(b);});}
  function stName(c){return (GEO[c]&&GEO[c].name)||{PR:"Puerto Rico",GU:"Guam",AS:"American Samoa",MP:"N. Mariana Is."}[c]||c;}
  function metricTotal(){return {total:DB.meta.grandTotal,fixed:DB.meta.fixedTotal,indexed:DB.meta.indexedTotal}[state.metric];}
  function renderList(target,header,rows,tot){var max=rows.length?rows[0][1]:0;
    var h='<p class="nathd">'+header+'</p><div class="natgrid">';
    rows.forEach(function(row,i){var w=max>0?Math.max(2,row[1]/max*100):0;
      var share=tot>0?(row[1]/tot*100):0;
      h+='<div class="am-natrow'+(i<3?' top3':'')+'"><div class="rk">'+(i+1)+'</div>'+
        '<div><div class="nm">'+row[0]+'</div><div class="barwrap"><div class="fl" style="width:'+w+'%"></div></div></div>'+
        '<div class="vv"><b>'+fmt(row[1])+'</b>'+share.toFixed(1)+'%</div></div>';});
    h+='</div>';root.querySelector(target).innerHTML=h;}
  function national(){var list=NATIONAL[state.metric]||[];var tot=metricTotal();
    renderList("#am-nat","Top "+list.length+" carriers nationwide by "+METLABEL[state.metric].toLowerCase()+
      " annuity direct premium &middot; total market "+fmt(tot)+" (share of U.S.)",list,tot);}
  function rankings(){var tot=metricTotal();
    var rows=Object.keys(DB.states).map(function(c){return [stName(c),DB.states[c][state.metric]];})
      .filter(function(r){return r[1]>0;}).sort(function(a,b){return b[1]-a[1];});
    renderList("#am-rank","All "+rows.length+" states &amp; territories by "+METLABEL[state.metric].toLowerCase()+
      " annuity premium &middot; total "+fmt(tot)+" (share of U.S.)",rows,tot);}
  function head(){root.querySelector("#am-subline").textContent=
      "Direct premium, $"+(DB.meta.grandTotal*1000/1e9).toFixed(0)+"B across "+DB.meta.nCarriers+" carriers \u00b7 Fixed $"+(DB.meta.fixedTotal*1000/1e9).toFixed(0)+"B \u00b7 Indexed $"+(DB.meta.indexedTotal*1000/1e9).toFixed(0)+"B";
    root.querySelector("#am-foot").innerHTML="Source: 2025 State-Specific Data by Carrier (S&amp;P Global Market Intelligence). Values are direct premium in U.S. dollars; all three views are filterable by product type. State Map: hover for totals, click a state for carrier detail. State Rankings: jurisdictions by premium and U.S. share. National Top 25: carrier totals across all states. Carrier names are display labels; see internal name map.";}
  function render(){
    root.setAttribute("data-view",state.view);
    if(state.view==="state"){paint();panel();terrChips();}
    else if(state.view==="rankings"){rankings();}
    else{national();}
    root.querySelectorAll("#am-metric button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-m")===state.metric);});
    root.querySelectorAll("#am-view button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-v")===state.view);});}
  root.querySelectorAll("#am-metric button").forEach(function(b){b.onclick=function(){state.metric=b.getAttribute("data-m");render();};});
  root.querySelectorAll("#am-view button").forEach(function(b){b.onclick=function(){state.view=b.getAttribute("data-v");render();};});
  head();render();
})();
</script>
